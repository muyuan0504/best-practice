<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <script>
            /** 使用Object.create创建对象
             * child 自己没有 say
             * JS 去 child.__proto__（也就是 parent）找
             * 找到了 → 调用成功
             */
            const parent = {
                name: 'parent',
            }

            const child = Object.create(parent)
            child.name = 'child'
            console.log(child.name) // child
        </script>
    </body>
</html>
