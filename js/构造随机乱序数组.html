    <body>
        <script>
            const originList = [1, 2, 3, 4, 5, 6]

            function shuffleList() {
                return originList.slice().sort(() => (Math.random() > 0.5 ? 1 : -1))
            }

            console.log(shuffleList(originList))
        </script>
